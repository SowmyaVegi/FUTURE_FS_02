<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mini CRM</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Mini CRM</h1>

        <div class="form">

            <input
                type="text"
                id="name"
                placeholder="Client Name"
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
            >

            <input
                type="text"
                id="source"
                placeholder="Source"
            >

            <textarea
                id="notes"
                placeholder="Notes"
            ></textarea>

            <button onclick="addLead()">
                Add Lead
            </button>

        </div>

        <h2>Leads</h2>

        <div id="leadList"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
