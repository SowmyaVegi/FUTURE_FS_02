<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini CRM Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
min-height:100vh;
}

/* Sidebar */

.sidebar{
width:250px;
background:#111827;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:15px;
margin:10px 0;
background:#1e293b;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.sidebar ul li:hover{
background:#38bdf8;
}

/* Main Content */

.main{
flex:1;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logout-btn{
background:#ef4444;
padding:10px 20px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

/* Dashboard Cards */

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

.card h3{
color:#38bdf8;
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
}

/* Search */

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

/* Add Lead */

.lead-form{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.lead-form input,
.lead-form select{
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

.add-btn{
background:#38bdf8;
border:none;
padding:12px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:#111827;
border-radius:15px;
overflow:hidden;
}

th{
background:#1e293b;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #1e293b;
}

.edit-btn{
background:#22c55e;
padding:8px 15px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.delete-btn{
background:#ef4444;
padding:8px 15px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

@media(max-width:900px){

.cards{
grid-template-columns:repeat(2,1fr);
}

.lead-form{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>Mini CRM</h2>

<ul>
<li>📊 Dashboard</li>
<li>👥 Leads</li>
<li>📞 Follow Ups</li>
<li>📈 Reports</li>
<li onclick="logout()">🚪 Logout</li>
</ul>

</div>

<!-- Main -->

<div class="main">

<div class="header">

<h1>CRM Dashboard</h1>

<button class="logout-btn"
onclick="logout()">
Logout
</button>

</div>

<!-- Cards -->

<div class="cards">

<div class="card">
<h3>Total Leads</h3>
<p id="totalLeads">0</p>
</div>

<div class="card">
<h3>New</h3>
<p id="newLeads">0</p>
</div>

<div class="card">
<h3>Contacted</h3>
<p id="contactedLeads">0</p>
</div>

<div class="card">
<h3>Converted</h3>
<p id="convertedLeads">0</p>
</div>

</div>

<!-- Search -->

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Lead..."
onkeyup="searchLead()">

</div>

<!-- Add Lead Form -->

<div class="lead-form">

<input
type="text"
id="name"
placeholder="Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="text"
id="phone"
placeholder="Phone">

<input
type="text"
id="company"
placeholder="Company">

<input
type="text"
id="source"
placeholder="Source">

<select id="status">
<option>New</option>
<option>Contacted</option>
<option>Qualified</option>
<option>Converted</option>
</select>

<button
class="add-btn"
onclick="addLead()">
Add Lead
</button>

</div>

<!-- Leads Table -->

<table>

<thead>

<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Company</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="leadTable">

</tbody>

</table>

</div>

<script src="script.js"></script>

<script>

if(!localStorage.getItem("user")){
window.location.href="login.html";
}

function logout(){

localStorage.removeItem("user");

window.location.href="login.html";

}

</script>

</body>
</html>
